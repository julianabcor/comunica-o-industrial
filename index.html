<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CENTROWEG | Intelligence Dashboard</title>
    
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>

    <style>
        :root {
            --bg: #0d1117;
            --card: #161b22;
            --border: #30363d;
            --text: #c9d1d9;
            --blue: #58a6ff;
            --red: #f85149;
            --green: #3fb950;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
            padding-bottom: 15px;
            margin-bottom: 25px;
        }

        .status-dot {
            height: 10px;
            width: 10px;
            background-color: #bbb;
            border-radius: 50%;
            display: inline-block;
            margin-right: 5px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }

        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 20px;
            text-align: center;
            transition: transform 0.2s;
        }

        .card:hover { transform: translateY(-5px); }

        .value {
            font-size: 3rem;
            font-weight: bold;
            color: var(--blue);
            margin: 10px 0;
        }

        .unit { font-size: 1rem; color: #8b949e; margin-left: 5px; }

        .alert-active {
            border-color: var(--red) !important;
            box-shadow: 0 0 15px rgba(248, 81, 73, 0.3);
        }

        #chart-container {
            grid-column: 1 / -1;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 15px;
            margin-top: 10px;
        }

        .btn-export {
            background: #21262d;
            color: var(--text);
            border: 1px solid var(--border);
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
        }

        .btn-export:hover { background: #30363d; }
    </style>
</head>
<body>

    <div class="header">
        <div>
            <h1 style="margin:0; font-size: 24px;">CENTROWEG <small style="font-weight: 200; font-size: 14px; opacity: 0.7;">| Equipe 4 - Monitoramento Preditivo</small></h1>
        </div>
        <div>
            <button class="btn-export" onclick="exportarCSV()">Baixar Logs (CSV)</button>
            <span id="mqtt-status-text" style="margin-left: 15px; font-size: 14px;">
                <span id="status-dot" class="status-dot"></span> Desconectado
            </span>
        </div>
    </div>

    <div class="grid">
        <div class="card" id="card-temp">
            <h3 style="margin:0; opacity:0.8;">Temperatura (Estator)</h3>
            <div class="value"><span id="val-temp">--</span><span class="unit">°C</span></div>
            <div id="stat-temp" style="font-size: 12px; color: #8b949e;">Média Móvel: --</div>
        </div>

        <div class="card">
            <h3 style="margin:0; opacity:0.8;">Umidade Relativa</h3>
            <div class="value"><span id="val-umid">--</span><span class="unit">%</span></div>
            <div style="font-size: 12px; color: #8b949e;">Ambiente Controlado</div>
        </div>

        <div class="card">
            <h3 style="margin:0; opacity:0.8;">Pressão Pneumática</h3>
            <div class="value"><span id="val-pres">--</span><span class="unit">hPa</span></div>
            <div style="font-size: 12px; color: #8b949e;">Sistema de Ar</div>
        </div>

        <div id="chart-container">
            <h3 style="margin:0 0 15px 10px; font-size: 16px;">Tendência Histórica (Análise Preditiva)</h3>
            <div id="main-chart"></div>
        </div>
    </div>

    <script>
        // --- CONFIGURAÇÕES ---
        const TOPICO = "centro_weg/projeto/equipe4";
        const BROKER_WS = "wss://broker.hivemq.com:8884/mqtt";
        
        let logDeDados = [];
        let historicoTemp = []; // Para cálculo de média móvel

        // --- INICIALIZAÇÃO DO GRÁFICO (ApexCharts) ---
        const chartOptions = {
            series: [{ name: 'Temperatura', data: [] }],
            chart: {
                type: 'area',
                height: 350,
                animations: { enabled: true, easing: 'linear', dynamicAnimation: { speed: 1000 } },
                toolbar: { show: false },
                background: 'transparent'
            },
            colors: ['#58a6ff'],
            fill: { type: 'gradient', gradient: { shadeIntensity: 1, opacityFrom: 0.4, opacityTo: 0.1 } },
            dataLabels: { enabled: false },
            stroke: { curve: 'smooth', width: 3 },
            theme: { mode: 'dark' },
            xaxis: { type: 'datetime', range: 60000 }, // Mostra janela de 1 minuto
            yaxis: { labels: { formatter: (val) => val.toFixed(1) + "°" } },
            grid: { borderColor: '#30363d' }
        };

        const chart = new ApexCharts(document.querySelector("#main-chart"), chartOptions);
        chart.render();

        // --- CONEXÃO MQTT ---
        const client = mqtt.connect(BROKER_WS);

        client.on('connect', () => {
            document.getElementById('status-dot').style.backgroundColor = 'var(--green)';
            document.getElementById('mqtt-status-text').innerHTML = '<span class="status-dot" style="background-color:var(--green)"></span> Conectado ao Broker';
            client.subscribe(TOPICO);
        });

        client.on('message', (topic, message) => {
            try {
                const data = JSON.parse(message.toString());
                const agora = new Date();
                const ts = agora.getTime();

                // 1. Atualizar IHM (Valores em destaque)
                document.getElementById('val-temp').innerText = data.temp.toFixed(1);
                document.getElementById('val-umid').innerText = data.umid.toFixed(1);
                document.getElementById('val-pres').innerText = Math.round(data.pres);

                // 2. Lógica de "Business Intelligence" (Média Móvel de 5 pontos)
                historicoTemp.push(data.temp);
                if(historicoTemp.length > 5) historicoTemp.shift();
                const media = historicoTemp.reduce((a,b) => a+b, 0) / historicoTemp.length;
                document.getElementById('stat-temp').innerText = `Média Móvel: ${media.toFixed(2)}°C`;

                // 3. Regra de Alerta (Preditivo/Segurança)
                const cardTemp = document.getElementById('card-temp');
                if(data.temp > 30) {
                    cardTemp.classList.add('alert-active');
                } else {
                    cardTemp.classList.remove('alert-active');
                }

                // 4. Alimentar o Gráfico de Tendência
                chart.appendData([{
                    data: [{ x: ts, y: data.temp }]
                }]);

                // 5. Salvar no "Data Lake" Local (para exportar CSV depois)
                logDeDados.push({
                    horario: agora.toLocaleTimeString(),
                    temperatura: data.temp,
                    umidade: data.umid,
                    pressao: data.pres
                });

            } catch (e) {
                console.error("Erro ao processar JSON:", e);
            }
        });

        // --- FUNÇÃO PARA EXPORTAR CSV ---
        function exportarCSV() {
            if(logDeDados.length === 0) return alert("Sem dados para exportar ainda!");
            
            let csv = "Horario,Temperatura,Umidade,Pressao\n";
            logDeDados.forEach(row => {
                csv += `${row.horario},${row.temperatura},${row.umidade},${row.pressao}\n`;
            });

            const blob = new Blob([csv], { type: 'text/csv' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.setAttribute('href', url);
            a.setAttribute('download', `log_equipe4_${new Date().getTime()}.csv`);
            a.click();
        }
    </script>
</body>
</html>
