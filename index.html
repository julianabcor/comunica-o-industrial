<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>WEG | Smart Control</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mqtt/4.3.7/mqtt.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --weg-blue: #005596; }
        body { background: #f4f7f6; font-family: sans-serif; }
        .navbar { background: var(--weg-blue); color: white; }
        .card-sensor { border: none; border-radius: 12px; transition: 0.3s; }
        .alert-mode { border: 2px solid #e74c3c !important; background: #fff5f5; }
        .btn-control { width: 100%; padding: 15px; font-weight: bold; border-radius: 10px; }
    </style>
</head>
<body>

<nav class="navbar navbar-dark p-3">
    <div class="container"><span>WEG INDUSTRIAL IOT - EQUIPE 4</span></div>
</nav>

<div class="container mt-4">
    <div class="row g-4">
        <div class="col-md-4">
            <div class="card card-sensor p-3 shadow-sm" id="card-temp">
                <h6>Temperatura</h6>
                <h2 id="val-temp">--</h2>
                <canvas id="chartTemp" height="100"></canvas>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card card-sensor p-3 shadow-sm">
                <h6>Umidade</h6>
                <h2 id="val-umid">--</h2>
                <p class="text-muted">Status: Operacional</p>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card card-sensor p-3 shadow-sm">
                <h6>Comando Remoto</h6>
                <p>Simulação de Atuador (Motor/Ventoinha)</p>
                <button class="btn btn-primary btn-control" onclick="enviarComando('ON')">LIGAR MOTOR</button>
                <button class="btn btn-outline-danger btn-control mt-2" onclick="enviarComando('OFF')">DESLIGAR</button>
            </div>
        </div>
    </div>
</div>

<script>
    const client = mqtt.connect('wss://broker.hivemq.com:8884/mqtt');
    
    // Configuração do Gráfico
    const ctx = document.getElementById('chartTemp').getContext('2d');
    const chart = new Chart(ctx, {
        type: 'line',
        data: { labels: [], datasets: [{ label: 'Temp', data: [], borderColor: '#005596' }] },
        options: { scales: { x: { display: false } } }
    });

    client.on('connect', () => { client.subscribe('centro_weg/projeto/equipe4'); });

    client.on('message', (topic, message) => {
        const data = JSON.parse(message.toString());
        document.getElementById('val-temp').innerText = data.temp.toFixed(1) + "°C";
        document.getElementById('val-umid').innerText = data.umid.toFixed(1) + "%";

        // Alerta Visual se temp > 30
        if(data.temp > 30) document.getElementById('card-temp').classList.add('alert-mode');
        else document.getElementById('card-temp').classList.remove('alert-mode');

        // Atualiza Gráfico
        chart.data.labels.push("");
        chart.data.datasets[0].data.push(data.temp);
        if(chart.data.labels.length > 10) { chart.data.labels.shift(); chart.data.datasets[0].data.shift(); }
        chart.update();
    });

    // Função de Bidirecionalidade (Controle)
    function enviarComando(cmd) {
        client.publish('centro_weg/projeto/comando', cmd);
        alert("Comando " + cmd + " enviado para a fábrica!");
    }
</script>
</body>
</html>
