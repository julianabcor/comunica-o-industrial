<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WEG | Smart Factory Dashboard</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mqtt/4.3.7/mqtt.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root { --weg-blue: #005596; --danger: #e74c3c; --success: #2ecc71; }
        body { background-color: #f8f9fa; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        .navbar { background-color: var(--weg-blue); box-shadow: 0 2px 15px rgba(0,0,0,0.2); }
        .card-industrial { border: none; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.08); transition: 0.3s; background: #fff; }
        .card-alert { border: 2px solid var(--danger) !important; animation: pulse 2s infinite; }
        
        @keyframes pulse { 0% { box-shadow: 0 0 0 0px rgba(231, 76, 60, 0.4); } 70% { box-shadow: 0 0 0 10px rgba(231, 76, 60, 0); } 100% { box-shadow: 0 0 0 0px rgba(231, 76, 60, 0); } }
        
        .sensor-label { font-size: 0.85rem; font-weight: bold; color: #6c757d; text-transform: uppercase; }
        .sensor-value { font-size: 2.8rem; font-weight: bold; color: #2d3436; }
        .chart-container { position: relative; height: 150px; width: 100%; }
        
        .status-badge { font-size: 0.7rem; padding: 5px 10px; border-radius: 20px; background: #e8f5e9; color: #2e7d32; }
    </style>
</head>
<body>

<nav class="navbar navbar-dark p-3">
    <div class="container d-flex justify-content-between">
        <span class="navbar-brand h1 m-0"><i class="fas fa-industry me-2"></i> WEG IOT PLATFORM</span>
        <span class="status-badge" id="mqtt-status"><i class="fas fa-circle me-1"></i> OFFLINE</span>
    </div>
</nav>

<div class="container mt-4">
    <div class="row g-4">
        <div class="col-lg-4 col-md-6">
            <div class="card card-industrial p-4" id="card-temp">
                <div class="d-flex justify-content-between">
                    <span class="sensor-label">Temperatura</span>
                    <i class="fas fa-thermometer-half text-muted"></i>
                </div>
                <div class="sensor-value"><span id="val-temp">--</span><small class="fs-4 text-muted">°C</small></div>
                <div class="chart-container">
                    <canvas id="chartTemp"></canvas>
                </div>
            </div>
        </div>

        <div class="col-lg-4 col-md-6">
            <div class="card card-industrial p-4">
                <div class="d-flex justify-content-between">
                    <span class="sensor-label">Umidade</span>
                    <i class="fas fa-tint text-primary"></i>
                </div>
                <div class="sensor-value"><span id="val-umid">--</span><small class="fs-4 text-muted">%</small></div>
                <p class="text-muted small">Status: Normal</p>
            </div>
        </div>

        <div class="col-lg-4 col-md-6">
            <div class="card card-industrial p-4">
                <div class="d-flex justify-content-between">
                    <span class="sensor-label">Pressão</span>
                    <i class="fas fa-tachometer-alt text-success"></i>
                </div>
                <div class="sensor-value"><span id="val-pres">--</span><small class="fs-4 text-muted"> hPa</small></div>
                <p class="text-muted small">Local: Jaraguá do Sul</p>
            </div>
        </div>
    </div>

    <footer class="text-center mt-5">
        <p class="text-muted small">Equipe 4 - Centro WEG &copy; 2026 | Jaraguá do Sul - SC</p>
    </footer>
</div>

<script>
    // Configuração do Gráfico
    const ctx = document.getElementById('chartTemp').getContext('2d');
    const chartTemp = new Chart(ctx, {
        type: 'line',
        data: { labels: [], datasets: [{ label: 'Histórico', data: [], borderColor: '#005596', tension: 0.4, fill: true, backgroundColor: 'rgba(0, 85, 150, 0.1)' }] },
        options: { plugins: { legend: { display: false } }, scales: { x: { display: false }, y: { beginAtZero: false } }, maintainAspectRatio: false }
    });

    // MQTT Setup
    const client = mqtt.connect('wss://broker.hivemq.com:8884/mqtt');
    
    client.on('connect', () => {
        document.getElementById('mqtt-status').innerHTML = '<i class="fas fa-circle me-1"></i> ONLINE';
        document.getElementById('mqtt-status').style.background = '#e8f5e9';
        client.subscribe('centro_weg/projeto/equipe4');
    });

    client.on('message', (topic, message) => {
        const data = JSON.parse(message.toString());
        
        // Atualiza Valores
        document.getElementById('val-temp').innerText = data.temp.toFixed(1);
        document.getElementById('val-umid').innerText = data.umid.toFixed(1);
        document.getElementById('val-pres').innerText = data.pres.toFixed(0);

        // Alerta de Temperatura (> 28°C como exemplo)
        const cardTemp = document.getElementById('card-temp');
        if(data.temp > 28) {
            cardTemp.classList.add('card-alert');
        } else {
            cardTemp.classList.remove('card-alert');
        }

        // Atualiza Gráfico (Mantém os últimos 10 pontos)
        const now = new Date().toLocaleTimeString();
        chartTemp.data.labels.push(now);
        chartTemp.data.datasets[0].data.push(data.temp);
        if(chartTemp.data.labels.length > 10) {
            chartTemp.data.labels.shift();
            chartTemp.data.datasets[0].data.shift();
        }
        chartTemp.update();
    });
</script>

</body>
</html>
